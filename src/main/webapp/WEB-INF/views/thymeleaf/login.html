<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Taller Web I</title>
    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <img th:src="@{/img/logo.png}" alt="Logo" class="logo-img">
            <div class="logo-text">
                <span class="nutri">Nutri</span>
                <span class="wallet">Wallet</span>
            </div>
        </div>
        <a class="register-link" th:href="@{/nuevo-usuario}">Registrarme</a>
    </nav>

    <main class="main-container">
        <section class="login-section">
            <div class="login-box">
                <h1>¡Qué bueno verte!</h1>
                <p class="subtitle">Ingresa para ver tu menú semanal inteligente y seguir ahorrando.</p>
                <form action="#" th:action="@{/validar-login}" method="POST" th:object="${datosLogin}">
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input th:field="*{email}" id="email" type="email" placeholder="tu@correo.com" required />
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input th:field="*{password}" id="password" type="password" placeholder="••••••••" required>
                    </div>
                    <button id="btn-login" type="submit">Iniciar Sesión</button>
                    <p class="error" th:if="${error != null}" th:text="'Error: ' + ${error}"></p>
                </form>
                <a id="btn-register" href="nuevo-usuario">Registrarme</a>
            </div>
        </section>
    </main>

    <!-- Boostrap core js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

    <script type="module" th:src="@{js/login.js}"></script>
</body>

</html>
