<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Taller Web I</title>

  <!-- custom style -->
  <link rel="stylesheet" th:href="@{/css/main.css}" />

</head>

<body>

  <nav class="navbar">
    <div class="logo">
      <span class="nutri">Nutri</span>
      <span class="wallet">Wallet</span>
    </div>

    <a th:href="@{/login}" class="register-link">Iniciar Sesión</a>
</nav>

  <main class="main-container">
    <section class="login-section">
      <div class="login-box">
        <h1>Crear Cuenta</h1>
        <p class="subtitle">Comenzá a organizar tu alimentación y tu presupuesto.</p>

        <form th:action="@{/registrarme}" method="POST" th:object="${usuario}">
          <div class="input-group">
            <label>Email</label>
            <input th:field="*{email}" type="email" placeholder="tu@correo.com" required>
          </div>

          <div class="input-group">
            <label>Contraseña</label>
            <input th:field="*{password}" type="password" placeholder="********" required>
          </div>
          <button id="btn-registrarme" type="submit">
            Registrarme
          </button>
          <p class="error" th:if="${error != null}" th:text="'Error: ' + ${error}">
          </p>
        </form>
      </div>
    </section>
  </main>

  <!-- /.container -->

  <!-- Boostrap core js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

</body>

</html>
