<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Busqueda de Supermercado</title>

    <!-- Boostrap core css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/estilos-generales-panel-cliente.css}" >
    <link rel="stylesheet" th:href="@{/css/error-mapas.css}">
    <link rel="stylesheet" th:href="@{/css/header-nuevo.css}">

</head>
<body>

<header class="header-panel-nuevo">
    <nav class="navbar-nueva">
        <a th:href="@{/home}" class="logotipo-nuevo">
            <img th:src="@{/img/logo.png}" alt="Wallet Logo" class="logo-img-nav" />
            <span class="brand-text">Nutri<span class="brand-subtext">Wallet</span></span>
        </a>

        <div class="header-divisor"></div>
        <h2 class="eslogan-nav">TU SALUD Y TU BOLSILLO, EN ARMONÍA</h2>

        <div class="header-acciones">
            <a th:href="@{/login}" class="btn-logout-nav">
                <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar sesión</span>
            </a>
        </div>
    </nav>
</header>

<aside th:replace="~{fragments-panel-cliente :: aside-panel}"></aside>

<main>

    <div class="contenedor-error">
        <div class="card-error">
            <div class="icono-error">
                <i class="bi bi-x-octagon-fill"></i>
            </div>
            <h1>Servicio de mapas no disponible</h1>
            <p th:text="${mensaje}">
                No fue posible consultar el servicio de mapas.
            </p>
            <a th:href="@{/busqueda-supermercados}" class="btn-volver">
                Volver a buscar supermercados
            </a>
        </div>
    </div>
</main>

</body>
</html>
