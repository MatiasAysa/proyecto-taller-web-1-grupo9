<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validar Presupuesto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 500px;
            margin-top: 5rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card shadow-sm form-container w-100">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0">Configuración de Presupuesto</h4>
        </div>
        <div class="card-body p-4">
            <div th:if="${mensaje}" class="alert alert-danger mb-3" role="alert" th:text="${mensaje}">
            </div>
            <!-- Tu formulario intacto (con agregados mínimos de layout Bootstrap) -->
            <form action="#" th:action="@{/mi-presupuesto}" method="post" th:object="${datosPresupuesto}">

                <div class="mb-3">
                    <label for="monto" class="form-label">Monto de dinero ($):</label>
                    <input type="number" id="monto" name="monto" th:field="*{monto}" class="form-control" placeholder="Ej: 50000" step="0.01" min="0" required />
                </div>

                <div class="mb-3">
                    <label for="intervalo" class="form-label">Período de tiempo:</label>
                    <select id="intervalo" name="intervalo" th:field="*{intervalo}" class="form-select" required>
                        <option value="0" selected>Seleccione un intervalo de tiempo...</option>
                        <option value="1">1 día</option>
                        <option value="7">7 días</option>
                        <option value="15">15 días</option>
                        <option value="30">30 días</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="fecha" class="form-label">Fecha de inicio:</label>
                    <!-- Se agregó la clase 'form-control' al input de fecha para unificar el diseño -->
                    <input type="date" name="fecha" id="fecha" th:field="*{fecha}" class="form-control" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Confirmar</button>
                </div>

            </form>

        </div>
    </div>
</div>
</body>
</html>
