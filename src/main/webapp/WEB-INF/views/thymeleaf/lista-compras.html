<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de compra</title>

    <!-- Boostrap core css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/lista-compras.css}">


</head>

<body>
<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">UNLAM</a>
</nav>

<main class="container mt-5">

    <h1 class="titulo-principal">
        Comidas Generadas
    </h1>

    <div class="contenedor-comidas">
        <div class="card-comida" th:each="comida : ${comidas}">
            <h2 th:text="${comida.nombre}"></h2>
            <ul>
                <li th:each="item : ${comida.ingredientes}">
                    <span th:text="${item.alimento.nombre}"></span>
                    <span th:text="${item.cantidadGramos}"></span>
                </li>
            </ul>
        </div>
    </div>
    <h1 class="titulo-principal">Lista de compras generada</h1>

    <div class="contenedor-comidas">
        <div class="card-comida">
            <ul>
                <li th:each="item : ${listaDeCompras}">
                    <span th:text="${item.alimento.nombre}"></span>
                    <span th:text="${item.cantidadTotal}"></span>
                    <span>$</span>
                    <span th:text="${item.precoTotal}"></span>
                </li>
            </ul>
            <h3>Total: $ <span th:text="${totalLista}"></span></h3>
        </div>
    </div>

</main>

</body>
</html>
