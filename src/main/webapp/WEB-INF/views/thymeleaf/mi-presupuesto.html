<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Presupuesto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .budget-container {
            max-width: 500px;
            margin-top: 5rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card shadow-sm budget-container w-100">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0">Mi Presupuesto</h4>
        </div>

        <div class="card-body p-4">

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                    <span class="text-muted"><i class="bi bi-wallet2 me-2"></i>Monto Inicial:</span>
                    <span class="fw-semibold" th:text="${'$' + #numbers.formatDecimal(monto, 1, 'POINT', 2, 'COMMA')}"></span>
                </div>

                <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                    <span class="text-muted"><i class="bi bi-calendar3 me-2"></i>Intervalo:</span>
                    <span class="fw-semibold" th:text="${intervalo + ' días'}"></span>
                </div>

                <div class="d-flex justify-content-between align-items-center py-2">
                    <span class="text-muted"><i class="bi bi-calendar-check me-2"></i>Presupuesto desde:</span>
                    <span class="fw-semibold" th:text="${fecha}"></span>
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <a th:href="@{/configurar-presupuesto}" class="btn btn-outline-primary">
                    <i class="bi bi-pencil-square me-2"></i>Modificar Presupuesto
                </a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
