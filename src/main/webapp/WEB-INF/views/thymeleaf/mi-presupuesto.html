<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Presupuesto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="../../../resources/core/css/main.css" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="../../../resources/core/css/presupuesto.css" th:href="@{/css/presupuesto.css}">
</head>
<body>

<div class="container justify-content-center">
    <div class="mx-auto mb-3 d-flex justify-content-start" style="max-width: 500px;">
        <a th:href="@{/Registro-perfil-alimentario}" class="btn-back-home">
            <i class="bi bi-arrow-left me-2" style="-webkit-text-stroke: 0.5px;"></i> Volver a perfil alimentario
        </a>
    </div>

    <div class="card shadow-sm mx-auto form-container card-custom w-100">

        <div class="card-header bg-custom-header text-center py-3">
            <h4 class="mb-0">Mi Presupuesto</h4>
        </div>

        <div class="card-body p-4 bg-white">

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                    <span class="text-custom-muted"><i class="bi bi-wallet2 me-2"></i>Monto Inicial:</span>
                    <span class="fw-bold" th:text="${'$' + #numbers.formatDecimal(monto, 1, 'POINT', 2, 'COMMA')}">$50.000,00</span>
                </div>

                <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                    <span class="text-custom-muted"><i class="bi bi-calendar3 me-2"></i>Intervalo:</span>
                    <span class="fw-bold" th:text="${intervalo + ' días'}">30 días</span>
                </div>

                <div class="d-flex justify-content-between align-items-center py-2">
                    <span class="text-custom-muted"><i class="bi bi-calendar-check me-2"></i>Presupuesto desde:</span>
                    <span class="fw-bold" th:text="${fecha}">2026-06-22</span>
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <a th:href="@{/configurar-presupuesto}" class="btn btn-custom-green shadow-sm text-center">
                    <i class="bi bi-pencil-square me-2"></i>Modificar Presupuesto
                </a>
                <a th:href="@{/planificador}" class="btn btn-custom-yellow shadow-sm text-center">
                    <i class="bi bi-journal-plus me-2"></i>Generar nuevo plan alimenticio
                </a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
