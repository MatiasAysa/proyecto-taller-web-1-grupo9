<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Recetas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../../resources/core/css/main.css" th:href="@{/css/main.css}">
    <link rel="stylesheet" href="../../../resources/core/css/mis-recetas.css" th:href="@{/css/mis-recetas.css}">
</head>
<body class="bg-custom-recipe">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="title-page">Mis Recetas</h1>
        <a th:href="@{/crear-receta}" class="btn-custom-primary">
            <i class="fas fa-plus me-2"></i>Crear receta nueva
        </a>
    </div>

    <div th:if="${recetas == null || recetas.isEmpty()}" class="empty-state-container text-center">
        <div class="empty-state-icon mb-4">
            <i class="fas fa-utensils"></i>
        </div>
        <h2 class="empty-state-title">Todavía no has creado ninguna receta</h2>
        <p class="empty-state-text">¡Empezá a armar tu propio recetario gastronómico ahora mismo!</p>
        <a th:href="@{/crear-receta}" class="btn-custom-secondary-action mt-3">
            <i class="fas fa-magic me-2"></i>Crear una receta nueva
        </a>
    </div>

    <div th:unless="${#lists.isEmpty(recetas)}" class="row">
        <div th:each="receta : ${recetas}" class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${receta.nombre}">Nombre de la Receta</h5>

                    <span class="badge bg-secondary mb-3" th:text="${receta.tipo}">DESAYUNO</span>

                    <h6>Ingredientes:</h6>
                    <ul class="list-group list-group-flush">
                        <li th:each="ingrediente : ${receta.ingredientes}" class="list-group-item d-flex justify-content-between align-items-center">
                            <span th:text="${ingrediente.nombre}">Papa</span>
                            <span class="badge bg-primary rounded-pill" th:text="${ingrediente.cantidad} + 'g'">200g</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
