<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Busqueda de Supermercados</title>

    <!-- LINK PARA LA LIBRERIA LEAFLET-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <!-- Boostrap core css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/estilos-generales-panel-cliente.css}" >
    <link rel="stylesheet" th:href="@{/css/busqueda-supermercados.css}">
    <link rel="stylesheet" th:href="@{/css/header-nuevo.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header class="header-panel-nuevo">
    <nav class="navbar-nueva">
        <a th:href="@{/home}" class="logotipo-nuevo">
            <img th:src="@{/img/logo.png}" alt="Wallet Logo" class="logo-img-nav" />
            <span class="brand-text">Nutri<span class="brand-subtext">Wallet</span></span>
        </a>

        <div class="header-divisor"></div>
        <h2 class="eslogan-nav">TU SALUD Y TU BOLSILLO, EN ARMONÍA</h2>

        <div class="header-acciones">
            <a th:href="@{/logout}" class="btn-logout-nav">
                <i class="fas fa-sign-out-alt"></i>
                <span>Cerrar sesión</span>
            </a>
        </div>
    </nav>
</header>

<aside th:replace="~{fragments-panel-cliente :: aside-panel}"></aside>

<main class="contenido-supermercados">
    <div class="card-busqueda">

        <h2>Buscar supermercados cercanos</h2>

        <form th:action="@{/ingreso-direccion}" method="POST" th:object="${direccion}" class="form-direccion">

            <input th:field="*{ubicacion}" type="text" placeholder="Calle" class="campo"/>
            <input th:field="*{numero}" type="number" placeholder="Número" class="campo"/>

            <button class="btn-buscar" type="submit">Buscar supermercados</button>
        </form>

    </div>

    <p id="latitud" hidden th:text="${latitud}"></p>
    <p id="longitud" hidden th:text="${longitud}"></p>

    <div id="map"></div>

    <div id="supermercados" style="display:none;">
        <div th:each="supermercado : ${supermercados}"
             class="supermercado"
             th:data-nombre="${supermercado.nombre}"
             th:data-direccion="${supermercado.direccionName}"
             th:data-distancia="${supermercado.distanciaMetros}"
             th:data-minutos="${supermercado.minutosCaminando}"
             th:data-latitud="${supermercado.cordenadas.latitud}"
             th:data-longitud="${supermercado.cordenadas.longitud}">
        </div>
    </div>

    <h2 class="titulo-lista">
        <i class="fas fa-store"></i>
        Supermercados encontrados
    </h2>

    <div class="lista-supermercados">
        <div class="card-super" th:each="supermercado : ${supermercados}">
            <div class="icono-super">
                <i class="fas fa-store"></i>
            </div>

            <div class="info-super">
                <h5 th:text="${supermercado.nombre}"></h5>
                <p class="direccion" th:text="${supermercado.direccionName}"></p>
                <div class="dato-super">
                    <i class="fas fa-location-dot"></i>
                    <span th:text="${#numbers.formatDecimal(supermercado.distanciaMetros,0,0)} + ' metros'"></span>
                </div>

                <div class="dato-super">
                    <i class="fas fa-person-walking"></i>
                    <span th:text="${supermercado.minutosCaminando} + ' min caminando'"></span>
                </div>
            </div>
        </div>
    </div>

</main>
<script type="module" th:src="@{js/busqueda_direccion.js}"></script>
<!-- LINK PARA LA LIBRERIA LEAFLET-->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</body>

</html>
